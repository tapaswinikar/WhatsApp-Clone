<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>WhatsApp Clone</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/lavanya.css">
    <link rel="stylesheet" href="css/tapaswini.css">
    <link rel="stylesheet" href="css/gaurav.css">

</head>

<body>

    <main class="container">

        <!-- ========================= -->

        <aside class="sidebar">
            <!-- Write your code only -->
            <div class="app-layout-wrapper">
        
        <nav class="orange-side-nav-strip">
            <div class="top-nav-icons-group">
                <div class="nav-icon-item active-state"><i class="fa-solid fa-message"></i></div>
                <div class="nav-icon-item"><i class="fa-solid fa-circle-notch"></i></div>
                <div class="nav-icon-item"><i class="fa-regular fa-compass"></i></div>
                <div class="nav-icon-item"><i class="fa-solid fa-users"></i></div>
            </div>
            <div class="bottom-nav-icons-group">
                <div class="nav-icon-item"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                <div class="nav-icon-item"><i class="fa-regular fa-image"></i></div>
                <div class="nav-avatar-display">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Prof" alt="Profile">
                </div>
            </div>
        </nav>
            </div>
        </aside>





        <!-- ========================= -->
        <!-- CHAT LIST [Dev: Tapaswini] -->
        <!-- ========================= -->

        <section class="chat-list">
            <!-- Write your code here -->

        </section>






        <!-- ========================= -->
        <!-- CHAT WINDOW [Dev: Lavanya] -->
        <!-- ========================= -->
        <section class="chat-window">
            <div class="conversation-body">
            <!-- Write your code here Lavanya -->
             <div class="chat-window">

    <div class="chat-header">
        <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="Profile">

        <div class="contact-info">
            <h3>Rahul</h3>
            <p>Online</p>
        </div>
    </div>

    <div class="chat-body">

        <div class="date">Today</div>

        <div class="received-message">
            <p>Hey Rahul! How are you?</p>
            <span>10:15 AM</span>
        </div>
            <div class="sent-message">
        <p>Hi! I'm doing great.</p>
        <span>10:16 AM</span>
    </div>
        <div class="received-message">
    <p>Are you coming to class today?</p>
    <span>10:17 AM</span>
</div>

<div class="sent-message">
    <p>Yes! I'll be there in 10 minutes.</p>
    <span>10:18 AM</span>
</div>

<div class="received-message">
    <p>Great! See you soon 😊</p>
    <span>10:19 AM</span>
</div>
    </div>
    </div>
            </div>



            <!-- =================== -->
            <!-- Bottom Input  [Dev: Gaurav - Part 2]-->
            <!-- =================== -->
            <div class="conversation-footer">
                <!-- Write your code here Gaurav -->
        <div class="app-layout-wrapper">
                 <div class="mock-chat-area">
            
            <footer class="orange-chat-footer">
                
                <div class="interactive-popup-holder">
                    <button class="popup-trigger-element"><i class="fa-solid fa-plus desktop-action-btn"></i></button>
                    <div class="pure-css-popup-menu attachment-dropdown-box">
                        <div class="popup-menu-item"><i class="fa-solid fa-file" style="color: #7f66ff;"></i> Document</div>
                        <div class="popup-menu-item"><i class="fa-solid fa-image" style="color: #007bfc;"></i> Gallery</div>
                    </div>
                </div>

                <div class="interactive-popup-holder" style="margin-left: 4px;">
                    <button class="popup-trigger-element"><i class="fa-regular fa-face-smile desktop-action-btn"></i></button>
                    <div class="pure-css-popup-menu emoji-dropdown-box desktop-emoji-panel">
                        <div class="emoji-header-title">Emojis</div>
                        <div class="emoji-grid-layout">
                            <span>😂</span><span>🔥</span><span>❤️</span><span>👍</span><span>🚀</span><span>🙏</span>
                            <span>😍</span><span>🎉</span><span>😎</span><span>👏</span><span>💡</span><span>🌟</span>
                        </div>
                    </div>
                </div>

                <div class="footer-input-wrapper">
                    
                    <div class="interactive-popup-holder mobile-only-element">
                        <button class="popup-trigger-element"><i class="fa-regular fa-face-laugh mobile-only-element"></i></button>
                        <div class="pure-css-popup-menu emoji-dropdown-box mobile-emoji-panel">
                            <div class="emoji-header-title">Emojis</div>
                            <div class="emoji-grid-layout">
                                <span>😂</span><span>🔥</span><span>❤️</span><span>👍</span><span>🚀</span><span>🙏</span>
                                <span>😍</span><span>🎉</span><span>😎</span><span>👏</span><span>💡</span><span>🌟</span>
                            </div>
                        </div>
                    </div>
                    
                    <input type="text" class="chat-message-input" placeholder="Type a message">
                    
                    <i class="fa-solid fa-paperclip mobile-only-element"></i>
                    <i class="fa-solid fa-indian-rupee-sign mobile-only-element" style="font-size: 17px;"></i>
                    <i class="fa-solid fa-camera mobile-only-element"></i>

                    <i class="fa-solid fa-microphone continuous-mic-icon desktop-action-btn"></i>
                    <i class="fa-solid fa-paper-plane dynamic-send-action desktop-action-btn"></i>

                    <div class="mic-container-circle mobile-only-element">
                        <i class="fa-solid fa-microphone continuous-mic-icon"></i>
                        <i class="fa-solid fa-paper-plane dynamic-send-action"></i>
                    </div>

                </div>
            </footer>

        </div>

        </div>
            </div>
        </section>





    </main>

</body>
